<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Descartes Inspection Dashboard</title>
    <!-- Descartes Compliance Suite: Geotab Add-In Dashboard -->
    <script>
      /**
       * Geotab Add-In Initialization
       * This script must be in the <head> to ensure it's defined before MyGeotab attempts to call it.
       */
      window.geotab = window.geotab || {};
      window.geotab.addin = window.geotab.addin || {};
      
      /**
       * Define the Add-In logic.
       * We use a shared function and assign it to multiple possible names to ensure compatibility.
       */
      var descartesAddIn = function (api, state) {
        console.log("Descartes Add-In: Constructor called");
        return {
          initialize: function (api, state, callback) {
            console.log("Descartes Add-In: Initializing...");
            window.geotabApi = api;
            window.geotabState = state;
            
            // Signal to MyGeotab that initialization is complete.
            // This MUST be called to prevent the "Technical Issue" error.
            if (typeof callback === 'function') {
              callback();
            }
            window.dispatchEvent(new CustomEvent('geotab-ready'));
          },
          focus: function (api, state) {
            console.log("Descartes Add-In: Focused");
            window.dispatchEvent(new CustomEvent('geotab-focus'));
          },
          blur: function (api, state) {
            console.log("Descartes Add-In: Blurred");
          }
        };
      };

      // Assign to possible camelCased variations of the Add-In name and menu name
      window.geotab.addin.descartesInspectionDashboard = descartesAddIn;
      window.geotab.addin.inspectionDashboard = descartesAddIn;
      window.geotab.addin.descartesDashboard = descartesAddIn;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
