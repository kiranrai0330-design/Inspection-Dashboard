<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Descartes Inspection Dashboard</title>
    <script>
      /**
       * Descartes Geotab Add-In Initialization
       * Super-Robust version to handle all Geotab environments.
       */
      window.geotab = window.geotab || {};
      window.geotab.addin = window.geotab.addin || {};
      
      // The factory function that Geotab calls
      window.descartesAddIn = function (api, state) {
        console.log("Descartes: Factory function called by MyGeotab");
        return {
          /**
           * initialize() is called when the Add-In is first loaded.
           * We must call the callback() to remove the "Technical Issue" overlay.
           */
          initialize: function (api, state, callback) {
            console.log("Descartes: initialize() called");
            window.geotabApi = api;
            window.geotabState = state;
            
            // Handle the callback signal (handshake)
            var cb = callback || (arguments.length > 2 ? arguments[2] : null);
            if (typeof cb === 'function') {
              console.log("Descartes: Sending handshake callback...");
              cb();
            }
            
            // Notify the React application
            window.dispatchEvent(new CustomEvent('geotab-ready'));
          },
          /**
           * focus() is called every time the user clicks the menu item.
           */
          focus: function (api, state) {
            console.log("Descartes: focus() called");
            window.dispatchEvent(new CustomEvent('geotab-focus'));
          },
          /**
           * blur() is called when the user navigates away.
           */
          blur: function () {
            console.log("Descartes: blur() called");
          }
        };
      };

      /**
       * Register the Add-In under every possible name variation.
       * This ensures compatibility regardless of the 'name' field in the JSON.
       */
      var possibleNames = [
        'DescartesDashboard',
        'descartesDashboard',
        'DescartesInspectionDashboard',
        'descartesInspectionDashboard',
        'Descartes_Inspection_Dashboard',
        'descartes_inspection_dashboard',
        'Descartes Inspection Dashboard',
        'InspectionDashboard',
        'inspectionDashboard',
        'Descartes',
        'descartes',
        'addin'
      ];

      // Use a Proxy to catch any name Geotab might be looking for
      if (typeof Proxy !== 'undefined') {
        window.geotab.addin = new Proxy(window.geotab.addin || {}, {
          get: function(target, name) {
            console.log("Descartes: Geotab requested addin name:", name);
            if (name in target) return target[name];
            // Fallback to our factory for any requested name
            return window.descartesAddIn;
          }
        });
      } else {
        // Fallback for older browsers
        possibleNames.forEach(function(name) {
          window.geotab.addin[name] = window.descartesAddIn;
        });
      }
      
      console.log("Descartes: Geotab entry points registered and Proxy active.");
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
