<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Descartes Inspection Dashboard</title>
    <script>
      /**
       * Descartes Geotab Add-In Initialization
       * Hardened version to resolve "Technical Issue" loading errors.
       */
      window.geotab = window.geotab || {};
      window.geotab.addin = window.geotab.addin || {};
      
      // The core Add-In factory function
      var descartesFactory = function (api, state) {
        return {
          initialize: function (api, state, callback) {
            console.log("Descartes: Initializing API...");
            window.geotabApi = api;
            window.geotabState = state;
            
            // Signal completion to MyGeotab
            if (typeof callback === 'function') {
              callback();
            }
            
            // Notify React app
            window.dispatchEvent(new CustomEvent('geotab-ready'));
          },
          focus: function (api, state) {
            window.dispatchEvent(new CustomEvent('geotab-focus'));
          },
          blur: function () {
            // Cleanup if needed
          }
        };
      };

      /**
       * Map the factory to every possible name variation to ensure 
       * MyGeotab finds the entry point regardless of configuration naming.
       */
      var addinNames = [
        'DescartesDashboard',
        'descartesDashboard',
        'descartesInspectionDashboard',
        'inspectionDashboard',
        'descartes',
        'addin'
      ];

      addinNames.forEach(function(name) {
        window.geotab.addin[name] = descartesFactory;
      });
      
      console.log("Descartes: Geotab entry points registered:", addinNames);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
